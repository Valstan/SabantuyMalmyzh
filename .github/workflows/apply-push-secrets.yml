# Разовый воркфлоу: сгенерировать VAPID-ключи для web-push и положить в прод-env.
#
# Ключи НЕ проходят через чат/репо (#008): генерируются прямо на раннере
# (npx web-push generate-vapid-keys), уезжают на бокс по шифрованному scp и
# дописываются в /etc/sabantuy/sabantuy.env. В логи не печатаются.
#
# ИДЕМПОТЕНТНО С ЗАЩИТОЙ: если VAPID_-строки уже есть в env — воркфлоу НИЧЕГО
# не меняет (смена ключей обесценила бы все существующие подписки браузеров).
# Осознанная ротация — вручную: удалить VAPID_* из env на боксе и перезапустить.
on:
  workflow_dispatch:

concurrency:
  group: sabantuy-prod-ssh
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -e
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$DEPLOY_SSH_HOST" ] || [ -z "$DEPLOY_SSH_PORT" ]; then
            echo "::error::Заданы не все: secrets.SSH_PRIVATE_KEY / vars.DEPLOY_SSH_HOST / vars.DEPLOY_SSH_PORT"
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_sabantuy
          chmod 600 ~/.ssh/id_ed25519_sabantuy
          ssh-keyscan -p "$DEPLOY_SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<CFG
          Host sabantuy
            HostName $DEPLOY_SSH_HOST
            Port $DEPLOY_SSH_PORT
            User valstan
            IdentityFile ~/.ssh/id_ed25519_sabantuy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          CFG
          chmod 600 ~/.ssh/config

      - name: Generate VAPID keys + write env on prod (skip if already set)
        run: |
          set -e
          # Уже настроено? Тогда не трогаем (стабильность ключей важнее).
          if ssh sabantuy 'sudo grep -q "^VAPID_PUBLIC_KEY=" /etc/sabantuy/sabantuy.env'; then
            echo "VAPID-ключи уже заведены — пропускаю (ротация только вручную)."
            exit 0
          fi
          # Генерация на раннере; в логи не выводим (json → файл).
          umask 077
          npx --yes web-push generate-vapid-keys --json > vapid.json
          node -e '
            const k = require("./vapid.json");
            const fs = require("fs");
            fs.writeFileSync("push.env", `VAPID_PUBLIC_KEY=${k.publicKey}\nVAPID_PRIVATE_KEY=${k.privateKey}\n`);
          '
          rm -f vapid.json
          scp -q push.env sabantuy:/tmp/push.env
          rm -f push.env
          ssh sabantuy 'sudo bash -s' <<'REMOTE'
          set -e
          ENV=/etc/sabantuy/sabantuy.env
          cat /tmp/push.env >> "$ENV"
          rm -f /tmp/push.env
          chown root:valstan "$ENV"
          chmod 640 "$ENV"
          systemctl restart sabantuy
          echo "VAPID lines in env now: $(grep -c '^VAPID_' "$ENV")"
          REMOTE

      - name: Verify (push configured)
        run: |
          set -e
          URL="https://xn--80aaac1aqpgcf4bqn1j.xn--p1ai/api/push/vapid"
          for i in 1 2 3 4 5 6 7 8; do
            sleep 6
            body=$(curl -s -m 20 "$URL" || echo '{}')
            echo "attempt $i — push/vapid: $(echo "$body" | grep -o '"configured":[a-z]*')"
            case "$body" in
              *'"configured":true'*) echo "✅ Web-push настроен."; exit 0 ;;
            esac
          done
          echo "::error::push/vapid не вернул configured:true за ~48с — проверь env и логи сервиса."
          exit 1
