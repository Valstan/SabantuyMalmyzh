# Разовый воркфлоу: положить ключи Object Storage (S3) в прод-env, минуя чат/репо.
#
# Зачем так: секретные ключи S3 (#008) нельзя писать в чат и в репозиторий. Владелец
# кладёт их в ЗАШИФРОВАННЫЕ секреты GitHub (Settings → Secrets and variables → Actions):
#   secrets.S3_ACCESS_KEY_ID      — идентификатор статического ключа (YCAJ…)
#   secrets.S3_SECRET_ACCESS_KEY  — секретный ключ (показан один раз)
# Затем запускаем этот воркфлоу (workflow_dispatch). Он по SSH (изолированный ключ #001,
# тот же, что у deploy-prod) дописывает блок S3_* в /etc/sabantuy/sabantuy.env и
# перезапускает сервис. Имя бакета/endpoint/регион — НЕ секрет, заданы литералами ниже.
#
# Идемпотентно: старые S3_*-строки удаляются и переписываются → повторный запуск
# просто пересинхронит. Значения секретов GitHub маскирует в логах.
on:
  workflow_dispatch:

concurrency:
  group: sabantuy-prod-ssh
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -e
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$DEPLOY_SSH_HOST" ] || [ -z "$DEPLOY_SSH_PORT" ]; then
            echo "::error::Заданы не все: secrets.SSH_PRIVATE_KEY / vars.DEPLOY_SSH_HOST / vars.DEPLOY_SSH_PORT"
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_sabantuy
          chmod 600 ~/.ssh/id_ed25519_sabantuy
          ssh-keyscan -p "$DEPLOY_SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<CFG
          Host sabantuy
            HostName $DEPLOY_SSH_HOST
            Port $DEPLOY_SSH_PORT
            User valstan
            IdentityFile ~/.ssh/id_ed25519_sabantuy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          CFG
          chmod 600 ~/.ssh/config

      - name: Write S3 env on prod + restart
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        run: |
          set -e
          if [ -z "$S3_ACCESS_KEY_ID" ] || [ -z "$S3_SECRET_ACCESS_KEY" ]; then
            echo "::error::Добавь secrets.S3_ACCESS_KEY_ID и secrets.S3_SECRET_ACCESS_KEY в Settings → Secrets and variables → Actions"
            exit 1
          fi
          # Блок env собираем на раннере (секреты GitHub маскирует в логах), шлём по
          # шифрованному scp, на боксе дописываем в env под root и чистим временный файл.
          umask 077
          cat > s3.env <<EOF
          S3_ENDPOINT=https://storage.yandexcloud.net
          S3_REGION=ru-central1
          S3_BUCKET=sabantuy-malm
          S3_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID
          S3_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY
          S3_PUBLIC_BASE_URL=https://sabantuy-malm.storage.yandexcloud.net
          EOF
          scp -q s3.env sabantuy:/tmp/s3.env
          rm -f s3.env
          ssh sabantuy 'sudo bash -s' <<'REMOTE'
          set -e
          ENV=/etc/sabantuy/sabantuy.env
          # убрать прежние S3_*-строки (идемпотентность), дописать свежий блок
          sed -i '/^S3_/d' "$ENV"
          cat /tmp/s3.env >> "$ENV"
          rm -f /tmp/s3.env
          chown root:valstan "$ENV"
          chmod 640 "$ENV"
          systemctl restart sabantuy
          echo "S3 lines in env now: $(grep -c '^S3_' "$ENV")"
          REMOTE

      - name: Verify (sign-upload no longer degraded)
        run: |
          set -e
          sleep 8
          URL="https://xn--80aaac1aqpgcf4bqn1j.xn--p1ai/api/ugc/sign-upload"
          code=$(curl -s -o /dev/null -w '%{http_code}' -m 20 -X POST \
            -H 'Content-Type: application/json' \
            -d '{"kind":"photo","contentType":"image/jpeg","sizeBytes":1000,"phase":"preparation"}' "$URL" || echo 000)
          echo "sign-upload HTTP: $code"
          if [ "$code" = "503" ]; then
            echo "::error::Всё ещё 503 — ключи не подхватились. Проверь значения секретов."
            exit 1
          fi
          if [ "$code" = "200" ]; then echo "✅ S3 настроен: presigned-ссылка выдаётся (200)."
          else echo "::warning::Код $code (не 503 — значит ключи на месте; разберём при e2e-смоуке)."; fi
