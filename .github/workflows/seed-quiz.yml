name: Seed quiz questions (manual)

# Наполняет ПРОД-БД вопросами познавательной игры-«угадайки» сидом
# web/src/seed/seedQuiz.ts (директива brain 2026-06-18).
#
# ⚠️ ПРЕДУСЛОВИЕ: миграция 20260618_140000 (таблицы quiz_questions*) уже накачена
#   на прод через apply-migration.yml И deploy-prod выкатил релиз с кодом игры
#   (/igra). Без таблиц сид упадёт; без кода ссылка «Игра» вела бы в 404.
#
# Безопасно для прода:
#   • Пишет только записи коллекции quiz-questions — никаких изменений схемы здесь
#     (схему ставит миграция). push в production выключен (NODE_ENV).
#   • Идемпотентен: существующие вопросы (по полю key) пропускаются; правки
#     организаторов в /admin не затираются. Перезапись текстов — input force=1.
#   • Медиа не качает (вопросы без картинок) → симлинки/MEDIA_DIR не нужны.
#   • PII нет — вопросы и факты публичны.
#
# Требует те же доступы, что deploy-prod.yml:
#   secrets.SSH_PRIVATE_KEY, vars.DEPLOY_SSH_HOST, vars.DEPLOY_SSH_PORT

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'git-ref репозитория для seed-кода на боксе'
        required: true
        default: 'main'
      force:
        description: 'Перезаписать существующие вопросы (1 = да, SEED_FORCE)'
        required: false
        default: '0'

concurrency:
  group: prod-db
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -e
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$DEPLOY_SSH_HOST" ] || [ -z "$DEPLOY_SSH_PORT" ]; then
            echo "::error::Заданы не все: secrets.SSH_PRIVATE_KEY / vars.DEPLOY_SSH_HOST / vars.DEPLOY_SSH_PORT"
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_sabantuy
          chmod 600 ~/.ssh/id_ed25519_sabantuy
          ssh-keyscan -p "$DEPLOY_SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<CFG
          Host sabantuy
            HostName $DEPLOY_SSH_HOST
            Port $DEPLOY_SSH_PORT
            User valstan
            IdentityFile ~/.ssh/id_ed25519_sabantuy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          CFG
          chmod 600 ~/.ssh/config

      - name: Seed on box
        run: |
          set -e
          ssh sabantuy 'bash -s' "${{ inputs.ref }}" "${{ inputs.force }}" <<'REMOTE'
          set -euo pipefail
          REF="$1"
          FORCE="${2:-0}"
          BASE=/home/valstan/sabantuy
          REPO="$BASE/repo"
          GIT_SSH="ssh -i $HOME/.ssh/github_sabantuy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

          # 1. Репо на боксе (read-only deploy key)
          if [ ! -d "$REPO/.git" ]; then
            GIT_SSH_COMMAND="$GIT_SSH" git clone git@github.com:Valstan/SabantuyMalmyzh.git "$REPO"
          fi
          cd "$REPO"
          GIT_SSH_COMMAND="$GIT_SSH" git fetch --depth 1 origin "$REF"
          git checkout -f FETCH_HEAD

          # 2. Зависимости (seed-рантайм; не next build → без OOM на 1.5 GiB)
          corepack prepare pnpm@10.15.0 --activate
          corepack pnpm -C web install --frozen-lockfile

          # 3. Секреты прода → env (значения НЕ печатаем)
          ENVF=/etc/sabantuy/sabantuy.env
          DB=$(grep '^DATABASE_URL=' "$ENVF" | head -1 | sed 's/^DATABASE_URL=//;s/^"//;s/"$//')
          SECRET=$(grep '^PAYLOAD_SECRET=' "$ENVF" | head -1 | sed 's/^PAYLOAD_SECRET=//;s/^"//;s/"$//')
          if [ -z "$DB" ] || [ -z "$SECRET" ]; then echo "::error::нет DATABASE_URL/PAYLOAD_SECRET в $ENVF"; exit 1; fi

          # 4. Seed вопросов игры (NODE_ENV=production → push выключен).
          echo "Запускаю seedQuiz на проде (force=$FORCE) ..."
          NODE_ENV=production SEED_FORCE="$FORCE" \
          DATABASE_URL="$DB" PAYLOAD_SECRET="$SECRET" \
            corepack pnpm -C web payload run src/seed/seedQuiz.ts

          # 5. Сводка (read-only)
          echo "вопросов всего: $(psql "$DB" -tAc "SELECT count(*) FROM quiz_questions;")"
          echo "опубликовано: $(psql "$DB" -tAc "SELECT count(*) FROM quiz_questions WHERE _status='published';")"
          REMOTE

      - name: Smoke — страницы игры
        run: |
          set -e
          for p in /igra /tt/igra; do
            S=$(ssh sabantuy "curl -s -o /dev/null -w '%{http_code}' --max-time 15 http://127.0.0.1:3000$p")
            echo "$p → $S"
            [ "$S" = "200" ] || { echo "::error::$p вернул $S, ожидался 200"; exit 1; }
          done
