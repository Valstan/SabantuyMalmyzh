# Разовый воркфлоу: положить креды VK ID в прод-env, минуя чат/репо.
#
# Зачем так (#008): Защищённый ключ VK нельзя писать в чат и в репозиторий. Владелец
# кладёт его в ЗАШИФРОВАННЫЙ секрет GitHub (Settings → Secrets and variables → Actions):
#   secrets.VK_CLIENT_SECRET — «Защищённый ключ» приложения VK
#     (для PKCE-обмена он не обязателен — PKCE его заменяет; храним на будущее).
# App ID (VK_CLIENT_ID) — НЕ секрет, задан литералом ниже (54656174).
# Затем запускаем этот воркфлоу (workflow_dispatch). По SSH (изолированный ключ #001)
# дописывает VK_* в /etc/sabantuy/sabantuy.env и перезапускает сервис.
#
# Идемпотентно: прежние VK_*-строки удаляются и переписываются. Значение секрета
# GitHub маскирует в логах. Подробности — docs/ops/vk-id-setup.md.
on:
  workflow_dispatch:

concurrency:
  group: sabantuy-prod-ssh
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -e
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$DEPLOY_SSH_HOST" ] || [ -z "$DEPLOY_SSH_PORT" ]; then
            echo "::error::Заданы не все: secrets.SSH_PRIVATE_KEY / vars.DEPLOY_SSH_HOST / vars.DEPLOY_SSH_PORT"
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_sabantuy
          chmod 600 ~/.ssh/id_ed25519_sabantuy
          ssh-keyscan -p "$DEPLOY_SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<CFG
          Host sabantuy
            HostName $DEPLOY_SSH_HOST
            Port $DEPLOY_SSH_PORT
            User valstan
            IdentityFile ~/.ssh/id_ed25519_sabantuy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          CFG
          chmod 600 ~/.ssh/config

      - name: Write VK env on prod + restart
        env:
          VK_CLIENT_SECRET: ${{ secrets.VK_CLIENT_SECRET }}
        run: |
          set -e
          if [ -z "$VK_CLIENT_SECRET" ]; then
            echo "::error::Добавь secrets.VK_CLIENT_SECRET в Settings → Secrets and variables → Actions"
            exit 1
          fi
          # Блок env собираем на раннере (секрет GitHub маскирует в логах), шлём по
          # шифрованному scp, на боксе дописываем в env под root и чистим временный файл.
          umask 077
          cat > vk.env <<EOF
          VK_CLIENT_ID=54656174
          VK_CLIENT_SECRET=$VK_CLIENT_SECRET
          VK_REDIRECT_URI=https://xn--80aac7atuli.xn--80adkdyec4j.xn--p1ai/api/auth/vk/callback
          EOF
          scp -q vk.env sabantuy:/tmp/vk.env
          rm -f vk.env
          ssh sabantuy 'sudo bash -s' <<'REMOTE'
          set -e
          ENV=/etc/sabantuy/sabantuy.env
          # убрать прежние VK_*-строки (идемпотентность), дописать свежий блок
          sed -i '/^VK_/d' "$ENV"
          cat /tmp/vk.env >> "$ENV"
          rm -f /tmp/vk.env
          chown root:valstan "$ENV"
          chmod 640 "$ENV"
          systemctl restart sabantuy
          echo "VK lines in env now: $(grep -c '^VK_' "$ENV")"
          REMOTE

      - name: Verify (vk login configured)
        run: |
          set -e
          # Next standalone после рестарта стартует не мгновенно → опрашиваем с ретраями,
          # иначе verify даёт ложный негатив (env записан и сервис поднят, но ещё прогревается).
          URL="https://xn--80aaac1aqpgcf4bqn1j.xn--p1ai/api/auth/vk/me"
          for i in 1 2 3 4 5 6 7 8; do
            sleep 6
            body=$(curl -s -m 20 "$URL" || echo '{}')
            echo "attempt $i — vk/me: $body"
            case "$body" in
              *'"configured":true'*) echo "✅ Вход через VK настроен (configured:true)."; exit 0 ;;
            esac
          done
          echo "::error::vk/me не вернул configured:true за ~48с — проверь VK_CLIENT_ID/секрет и логи сервиса."
          exit 1
