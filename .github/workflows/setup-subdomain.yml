name: Domain CORS (manual)

# Добавляет origin нового домена сабантуй.вмалмыже.рф в CORS бакета Object Storage,
# чтобы загрузка фото/видео «Народной ленты» (presigned PUT браузер→S3) работала и с
# нового домена. Аддитивно — существующие origin'ы (сабантуймалмыж.рф) остаются.
#
# Почему через раннер: @aws-sdk на боксе вшит в бандл (отдельно не вызвать), а с машины
# разработчика бокс недоступен (G8). Раннер ставит web-deps (там @aws-sdk) и пайпит
# S3_*-креды из /etc/sabantuy/sabantuy.env по SSH в STDIN скрипта — значения в логи НЕ
# попадают (на экран только origins).
#
#   mode=inspect (по умолчанию) — только показать текущий CORS.
#   mode=apply — добавить NEW_ORIGIN и перечитать.
#
# Требует те же доступы, что deploy-prod.yml:
#   secrets.SSH_PRIVATE_KEY, vars.DEPLOY_SSH_HOST, vars.DEPLOY_SSH_PORT

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'inspect (показать CORS) | apply (добавить origin)'
        required: true
        default: 'inspect'
        type: choice
        options: [inspect, apply]

concurrency:
  group: prod-s3-cors
  cancel-in-progress: false

env:
  NEW_ORIGIN: https://xn--80aac7atuli.xn--80adkdyec4j.xn--p1ai   # https://сабантуй.вмалмыже.рф

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable corepack + pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.0 --activate

      - name: Install web deps (для @aws-sdk)
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -e
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$DEPLOY_SSH_HOST" ] || [ -z "$DEPLOY_SSH_PORT" ]; then
            echo "::error::Заданы не все: secrets.SSH_PRIVATE_KEY / vars.DEPLOY_SSH_HOST / vars.DEPLOY_SSH_PORT"
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_sabantuy
          chmod 600 ~/.ssh/id_ed25519_sabantuy
          ssh-keyscan -p "$DEPLOY_SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<CFG
          Host sabantuy
            HostName $DEPLOY_SSH_HOST
            Port $DEPLOY_SSH_PORT
            User valstan
            IdentityFile ~/.ssh/id_ed25519_sabantuy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          CFG
          chmod 600 ~/.ssh/config

      - name: Update CORS
        run: |
          set -e -o pipefail
          # Креды S3 идут с бокса по SSH прямо в STDIN скрипта — в логах их нет.
          ssh sabantuy 'grep -E "^S3_(ENDPOINT|REGION|BUCKET|ACCESS_KEY_ID|SECRET_ACCESS_KEY)=" /etc/sabantuy/sabantuy.env' \
            | node web/scripts/update-s3-cors.mjs "${{ inputs.mode }}" "$NEW_ORIGIN"
