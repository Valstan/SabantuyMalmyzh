name: Seed prep posts (manual)

# Наполняет ПРОД-БД серией постов «Готовимся к Сабантую» (что надеть, что взять,
# топ-10 угощений, история, корэш) сидом web/src/seed/seedPrepPosts.ts.
#
# Безопасно для прода:
#   • Создаёт до 5 записей коллекции news, без Media и без схемы.
#   • Идемпотентен: пост по slug уже есть → не трогается (правки в /admin
#     сохраняются), force=1 (SEED_FORCE) перезаписывает осознанно.
#
# Предусловие: миграция 20260702_090000 (таблицы news) на проде уже есть.
# Требует те же доступы, что deploy-prod.yml.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'git-ref репозитория для seed-кода на боксе'
        required: true
        default: 'main'
      force:
        description: 'Перезаписать существующие посты (1 = да, SEED_FORCE)'
        required: false
        default: '0'

concurrency:
  group: prod-db
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -e
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$DEPLOY_SSH_HOST" ] || [ -z "$DEPLOY_SSH_PORT" ]; then
            echo "::error::Заданы не все: secrets.SSH_PRIVATE_KEY / vars.DEPLOY_SSH_HOST / vars.DEPLOY_SSH_PORT"
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_sabantuy
          chmod 600 ~/.ssh/id_ed25519_sabantuy
          ssh-keyscan -p "$DEPLOY_SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<CFG
          Host sabantuy
            HostName $DEPLOY_SSH_HOST
            Port $DEPLOY_SSH_PORT
            User valstan
            IdentityFile ~/.ssh/id_ed25519_sabantuy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          CFG
          chmod 600 ~/.ssh/config

      - name: Seed on box
        run: |
          set -e
          ssh sabantuy 'bash -s' "${{ inputs.ref }}" "${{ inputs.force }}" <<'REMOTE'
          set -euo pipefail
          REF="$1"
          FORCE="${2:-0}"
          BASE=/home/valstan/sabantuy
          REPO="$BASE/repo"
          GIT_SSH="ssh -i $HOME/.ssh/github_sabantuy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

          if [ ! -d "$REPO/.git" ]; then
            GIT_SSH_COMMAND="$GIT_SSH" git clone git@github.com:Valstan/SabantuyMalmyzh.git "$REPO"
          fi
          cd "$REPO"
          GIT_SSH_COMMAND="$GIT_SSH" git fetch --depth 1 origin "$REF"
          git checkout -f FETCH_HEAD

          corepack prepare pnpm@10.15.0 --activate
          corepack pnpm -C web install --frozen-lockfile

          ENVF=/etc/sabantuy/sabantuy.env
          DB=$(grep '^DATABASE_URL=' "$ENVF" | head -1 | sed 's/^DATABASE_URL=//;s/^"//;s/"$//')
          SECRET=$(grep '^PAYLOAD_SECRET=' "$ENVF" | head -1 | sed 's/^PAYLOAD_SECRET=//;s/^"//;s/"$//')
          MEDIA=$(grep '^MEDIA_DIR=' "$ENVF" | head -1 | sed 's/^MEDIA_DIR=//;s/^"//;s/"$//')
          if [ -z "$DB" ] || [ -z "$SECRET" ]; then echo "::error::нет DATABASE_URL/PAYLOAD_SECRET в $ENVF"; exit 1; fi
          if [ -z "$MEDIA" ]; then echo "::error::нет MEDIA_DIR в $ENVF — фото легли бы в чекаут"; exit 1; fi

          echo "Запускаю seedPrepPosts на проде (force=$FORCE) ..."
          NODE_ENV=production SEED_FORCE="$FORCE" \
          DATABASE_URL="$DB" PAYLOAD_SECRET="$SECRET" MEDIA_DIR="$MEDIA" \
            corepack pnpm -C web payload run src/seed/seedPrepPosts.ts

          echo "посты в БД: $(psql "$DB" -tAc "SELECT count(*) FROM news WHERE slug IN ('chto-nadet-na-sabantuy','chto-vzyat-s-soboy-na-sabantuy','top-10-ugoshcheniy-sabantuya','istoriya-sabantuya-v-malmyzhe','podgotovka-idet-polnym-hodom','koresh-borba-na-poyasakh');")"
          REMOTE

      - name: Smoke — посты
        run: |
          set -e
          for p in /novosti /novosti/chto-nadet-na-sabantuy /novosti/koresh-borba-na-poyasakh; do
            S=$(ssh sabantuy "curl -s -o /dev/null -w '%{http_code}' --max-time 15 http://127.0.0.1:3000$p")
            echo "$p → $S"
            [ "$S" = "200" ] || { echo "::error::$p вернул $S, ожидался 200"; exit 1; }
          done
