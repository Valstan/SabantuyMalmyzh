name: Seed real program 2026 (manual)

# Заливает РЕАЛЬНУЮ программу Сабантуя-2026 (официальное расписание оргкомитета,
# афиша от 2026-07-02) сидом web/src/seed/seedProgram2026.ts: создаёт события
# p2026-* и УДАЛЯЕТ демо-события demo-* (их заменяет реальная программа).
#
# Для прода:
#   • Записи коллекции Events — без новых таблиц/полей → миграции (#017) НЕ
#     нужны. push в production выключен (NODE_ENV).
#   • Идемпотентно: существующие по slug пропускаются; force=1 (SEED_FORCE) —
#     обновить.
#   • ⚠️ УДАЛЯЕТ события со slug «demo-*» (сид-контент, невосстановимо в БД,
#     восстановимо сидом seedDemoProgram) — запуск только с ведома владельца.
#   • Медиа не качает.
#
# Предусловие: deploy-prod уже выкатил релиз с DEMO_SCHEDULE=false.
#
# Требует те же доступы, что deploy-prod.yml:
#   secrets.SSH_PRIVATE_KEY, vars.DEPLOY_SSH_HOST, vars.DEPLOY_SSH_PORT

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'git-ref репозитория для seed-кода на боксе'
        required: true
        default: 'main'
      force:
        description: 'Перезаписать существующие события (1 = да, SEED_FORCE)'
        required: false
        default: '0'

concurrency:
  group: prod-db
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -e
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$DEPLOY_SSH_HOST" ] || [ -z "$DEPLOY_SSH_PORT" ]; then
            echo "::error::Заданы не все: secrets.SSH_PRIVATE_KEY / vars.DEPLOY_SSH_HOST / vars.DEPLOY_SSH_PORT"
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_sabantuy
          chmod 600 ~/.ssh/id_ed25519_sabantuy
          ssh-keyscan -p "$DEPLOY_SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<CFG
          Host sabantuy
            HostName $DEPLOY_SSH_HOST
            Port $DEPLOY_SSH_PORT
            User valstan
            IdentityFile ~/.ssh/id_ed25519_sabantuy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          CFG
          chmod 600 ~/.ssh/config

      - name: Seed on box
        run: |
          set -e
          ssh sabantuy 'bash -s' "${{ inputs.ref }}" "${{ inputs.force }}" <<'REMOTE'
          set -euo pipefail
          REF="$1"
          FORCE="${2:-0}"
          BASE=/home/valstan/sabantuy
          REPO="$BASE/repo"
          GIT_SSH="ssh -i $HOME/.ssh/github_sabantuy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

          if [ ! -d "$REPO/.git" ]; then
            GIT_SSH_COMMAND="$GIT_SSH" git clone git@github.com:Valstan/SabantuyMalmyzh.git "$REPO"
          fi
          cd "$REPO"
          GIT_SSH_COMMAND="$GIT_SSH" git fetch --depth 1 origin "$REF"
          git checkout -f FETCH_HEAD

          corepack prepare pnpm@10.15.0 --activate
          corepack pnpm -C web install --frozen-lockfile

          ENVF=/etc/sabantuy/sabantuy.env
          DB=$(grep '^DATABASE_URL=' "$ENVF" | head -1 | sed 's/^DATABASE_URL=//;s/^"//;s/"$//')
          SECRET=$(grep '^PAYLOAD_SECRET=' "$ENVF" | head -1 | sed 's/^PAYLOAD_SECRET=//;s/^"//;s/"$//')
          if [ -z "$DB" ] || [ -z "$SECRET" ]; then echo "::error::нет DATABASE_URL/PAYLOAD_SECRET в $ENVF"; exit 1; fi

          echo "Запускаю seedProgram2026 на проде (force=$FORCE) ..."
          NODE_ENV=production SEED_FORCE="$FORCE" \
          DATABASE_URL="$DB" PAYLOAD_SECRET="$SECRET" \
            corepack pnpm -C web payload run src/seed/seedProgram2026.ts

          echo "events p2026 в БД: $(psql "$DB" -tAc "SELECT count(*) FROM events WHERE slug LIKE 'p2026-%';")"
          echo "events demo осталось: $(psql "$DB" -tAc "SELECT count(*) FROM events WHERE slug LIKE 'demo-%';")"
          REMOTE

      - name: Smoke — главная и события реальной программы
        run: |
          set -e
          for p in / /events/p2026-otkrytie /events/p2026-skachki; do
            S=$(ssh sabantuy "curl -s -o /dev/null -w '%{http_code}' --max-time 15 http://127.0.0.1:3000$p")
            echo "$p → $S"
            [ "$S" = "200" ] || { echo "::error::$p вернул $S, ожидался 200"; exit 1; }
          done
