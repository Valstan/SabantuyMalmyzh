name: Recover fotostena media files (manual)

# Разовое восстановление: approve-хук при модерации (до фикса moderate-vk.yml)
# скачал кадры фотостены в public/media ЧЕКАУТА репо, а не в персистентный
# MEDIA_DIR (staticDir живого приложения) → битые картинки на /fotostena.
# Этот воркфлоу копирует уже скачанные файлы из чекаута в MEDIA_DIR.
#
# action=diagnose — только счётчики (read-only).
# action=copy     — скопировать fotostena-* из чекаута в MEDIA_DIR (cp -n).

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'diagnose | copy'
        required: true
        default: 'diagnose'

concurrency:
  group: prod-db
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -e
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_sabantuy
          chmod 600 ~/.ssh/id_ed25519_sabantuy
          ssh-keyscan -p "$DEPLOY_SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<CFG
          Host sabantuy
            HostName $DEPLOY_SSH_HOST
            Port $DEPLOY_SSH_PORT
            User valstan
            IdentityFile ~/.ssh/id_ed25519_sabantuy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          CFG
          chmod 600 ~/.ssh/config

      - name: Recover on box
        run: |
          set -e
          ssh sabantuy 'bash -s' "${{ inputs.action }}" <<'REMOTE'
          set -euo pipefail
          ACTION="$1"
          ENVF=/etc/sabantuy/sabantuy.env
          MEDIA=$(grep '^MEDIA_DIR=' "$ENVF" | head -1 | sed 's/^MEDIA_DIR=//;s/^"//;s/"$//')
          SRC=/home/valstan/sabantuy/repo/web/public/media
          echo "MEDIA_DIR = $MEDIA"
          echo "SRC       = $SRC"
          echo "--- fotostena-файлов в чекауте (SRC): $(ls -1 "$SRC"/fotostena-* 2>/dev/null | wc -l)"
          echo "--- fotostena-файлов в MEDIA_DIR:     $(ls -1 "$MEDIA"/fotostena-* 2>/dev/null | wc -l)"

          if [ "$ACTION" = "copy" ]; then
            if ! ls "$SRC"/fotostena-* >/dev/null 2>&1; then
              echo "::error::в чекауте нет fotostena-файлов — копировать нечего (нужен re-download)"; exit 1
            fi
            mkdir -p "$MEDIA"
            cp -n "$SRC"/fotostena-* "$MEDIA"/ 2>/dev/null || true
            echo "--- после копирования в MEDIA_DIR: $(ls -1 "$MEDIA"/fotostena-* 2>/dev/null | wc -l)"
            # Проверка отдачи одного кадра живым приложением
            F=$(ls -1 "$MEDIA"/fotostena-*-400x225.jpg 2>/dev/null | head -1 | xargs -r basename)
            if [ -n "$F" ]; then
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "http://127.0.0.1:3000/api/media/file/$F")
              echo "smoke: /api/media/file/$F -> $code"
            fi
          fi
          REMOTE
