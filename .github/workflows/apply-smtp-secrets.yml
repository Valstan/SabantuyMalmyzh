# Разовый воркфлоу: положить SMTP-доступы в прод-env, минуя чат/репо.
#
# Зачем так (#008): пароль приложения Яндекса нельзя писать в чат и в репозиторий.
# Владелец кладёт его в ЗАШИФРОВАННЫЙ секрет GitHub (Settings → Secrets and variables
# → Actions → New repository secret):
#   secrets.SMTP_PASS — пароль приложения для ящика valstan@valstan.ru
#     (id.yandex.ru → Безопасность → Пароли приложений → «Почта»; обычный пароль
#      аккаунта по SMTP Яндекс не пустит при включённой 2FA).
# Затем запускаем этот воркфлоу (workflow_dispatch). Он по SSH (изолированный ключ
# #001, тот же, что у deploy-prod / apply-s3-keys) дописывает блок SMTP_* +
# ORGANIZER_EMAIL в /etc/sabantuy/sabantuy.env и перезапускает сервис.
#
# Не-секретные значения (host/port/secure/user/from/organizer) — литералами ниже:
# valstan.ru хостится на Яндексе (MX mx.yandex.ru, SPF redirect=_spf.yandex.net),
# поэтому smtp.yandex.ru:465 SSL; ящик и отправитель — valstan@valstan.ru. Репо
# приватный, адрес владельца = публичный контакт оргкомитета.
#
# Идемпотентно: прежние SMTP_*/ORGANIZER_EMAIL-строки удаляются и переписываются →
# повторный запуск просто пересинхронит. Значение секрета GitHub маскирует в логах.
#
# Подробности и e2e-проверка — docs/ops/smtp-setup.md.
on:
  workflow_dispatch:

concurrency:
  group: sabantuy-prod-ssh
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -e
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$DEPLOY_SSH_HOST" ] || [ -z "$DEPLOY_SSH_PORT" ]; then
            echo "::error::Заданы не все: secrets.SSH_PRIVATE_KEY / vars.DEPLOY_SSH_HOST / vars.DEPLOY_SSH_PORT"
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_sabantuy
          chmod 600 ~/.ssh/id_ed25519_sabantuy
          ssh-keyscan -p "$DEPLOY_SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<CFG
          Host sabantuy
            HostName $DEPLOY_SSH_HOST
            Port $DEPLOY_SSH_PORT
            User valstan
            IdentityFile ~/.ssh/id_ed25519_sabantuy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          CFG
          chmod 600 ~/.ssh/config

      - name: Write SMTP env on prod + restart
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          set -e
          if [ -z "$SMTP_PASS" ]; then
            echo "::error::Добавь secrets.SMTP_PASS (пароль приложения Яндекса для valstan@valstan.ru) в Settings → Secrets and variables → Actions"
            exit 1
          fi
          # Блок env собираем на раннере (секрет GitHub маскирует в логах), шлём по
          # шифрованному scp, на боксе дописываем в env под root и чистим временный файл.
          # Значение с пробелом (SMTP_FROM_NAME) — в кавычках: systemd EnvironmentFile
          # их снимает, а любой `source` env-файла не сломается на word-splitting
          # (грабля env-файла от trener, 2026-06-27).
          umask 077
          cat > smtp.env <<EOF
          SMTP_HOST=smtp.yandex.ru
          SMTP_PORT=465
          SMTP_SECURE=true
          SMTP_USER=valstan@valstan.ru
          SMTP_PASS=$SMTP_PASS
          SMTP_FROM_ADDRESS=valstan@valstan.ru
          SMTP_FROM_NAME="Сабантуй Малмыж"
          ORGANIZER_EMAIL=valstan@valstan.ru
          EOF
          scp -q smtp.env sabantuy:/tmp/smtp.env
          rm -f smtp.env
          ssh sabantuy 'sudo bash -s' <<'REMOTE'
          set -e
          ENV=/etc/sabantuy/sabantuy.env
          # убрать прежние SMTP_*/ORGANIZER_EMAIL-строки (идемпотентность), дописать свежий блок
          sed -i '/^SMTP_/d; /^ORGANIZER_EMAIL=/d' "$ENV"
          cat /tmp/smtp.env >> "$ENV"
          rm -f /tmp/smtp.env
          chown root:valstan "$ENV"
          chmod 640 "$ENV"
          systemctl restart sabantuy
          echo "SMTP lines in env now: $(grep -cE '^(SMTP_|ORGANIZER_EMAIL=)' "$ENV")"
          REMOTE

      - name: Verify (service up, config present)
        run: |
          set -e
          sleep 8
          # 1) Сервис поднялся после рестарта и env-строки на месте.
          ssh sabantuy 'sudo bash -s' <<'REMOTE'
          set -e
          ENV=/etc/sabantuy/sabantuy.env
          n=$(grep -cE '^(SMTP_|ORGANIZER_EMAIL=)' "$ENV")
          echo "env SMTP/ORGANIZER lines: $n"
          if [ "$n" -lt 8 ]; then echo "::error::Ожидалось 8 строк (7 SMTP_ + ORGANIZER_EMAIL), есть $n"; exit 1; fi
          systemctl is-active sabantuy
          REMOTE
          # 2) Сайт отвечает (рестарт не уронил прод).
          code=$(curl -s -o /dev/null -w '%{http_code}' -m 20 "https://xn--80aaac1aqpgcf4bqn1j.xn--p1ai/" || echo 000)
          echo "homepage HTTP: $code"
          if [ "$code" != "200" ]; then echo "::error::Главная вернула $code после рестарта"; exit 1; fi
          echo "✅ SMTP-конфиг записан, сервис активен, сайт отвечает 200."
          echo "ℹ️  e2e (реальная доставка письма) — по docs/ops/smtp-setup.md: подписка с valstan@valstan.ru → письмо в ящик."
