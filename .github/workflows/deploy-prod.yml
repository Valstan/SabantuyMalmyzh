name: Deploy to production

# Сборка едет в CI (ubuntu), т.к. прод-VPS (1.5 GiB RAM, без swap) не тянет next build.
# На сервер по SSH кладём готовый standalone-артефакт и рестартим systemd-сервис.
#
# Требуется:
#   secrets.SSH_PRIVATE_KEY        — приватная часть изолированного ключа id_ed25519_sabantuy (#001)
#   vars.DEPLOY_SSH_HOST           — <hex>.vps.myjino.ru (myjino ротирует — потому в vars, не в коде)
#   vars.DEPLOY_SSH_PORT           — внешний порт (G8: внешний ≠ внутренний 22)
#   vars.NEXT_PUBLIC_SERVER_URL    — публичный URL (пока http://127.0.0.1:3000; на TLS-этапе → домен)

on:
  push:
    branches: [main]
    # docs/почта/markdown не трогают прод — не гоняем пересборку+рестарт зря.
    # Мешанина (код + docs) всё равно триггерит: ignore срабатывает, только если
    # ВСЕ изменённые файлы под паттернами.
    paths-ignore:
      - 'docs/**'
      - 'mailbox/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sabantuy_build
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      # Предохранитель миграций (#017): `payload migrate` в CI зависает (drizzle
      # push:true prompt) и стандартный standalone-бандл не несёт payload CLI →
      # Payload-миграции применяет разработчик ВРУЧНУЮ на проде (psql -f .sql +
      # запись в payload_migrations) ДО деплоя. CI лишь проверяет, что в коммите
      # нет неприменённых миграций. Ручной workflow_dispatch = «уже применил» →
      # guard пропускается (G6: escape-hatch должен реально обходить предохранитель).
      - name: Migration guard
        if: github.event_name != 'workflow_dispatch'
        run: |
          set -e
          NEW=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'web/src/migrations/*.ts' | grep -v '/index\.ts$' || true)
          if [ -n "$NEW" ]; then
            echo "::error::Коммит вносит новые Payload-миграции. Примени их на проде вручную (psql -f web/src/migrations/<ts>.sql + INSERT в payload_migrations), затем запусти деплой через workflow_dispatch."
            echo "$NEW"
            exit 1
          fi
          echo "Новых Payload-миграций в коммите нет — деплой продолжается."

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable corepack + pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.0 --activate

      - name: Install deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Generate importmap + types
        working-directory: web
        run: |
          pnpm generate:importmap
          pnpm generate:types

      - name: Build (standalone)
        working-directory: web
        env:
          # Эфемерная БД CI: push:true создаёт схему здесь, prerender отдаёт пустые
          # страницы (контента в CI нет) — рантайм наполнит через ISR/ревалидацию.
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sabantuy_build
          PAYLOAD_SECRET: ci-build-only-secret-not-used-at-runtime
          NEXT_PUBLIC_SERVER_URL: ${{ vars.NEXT_PUBLIC_SERVER_URL || 'http://127.0.0.1:3000' }}
        run: pnpm build

      - name: Assemble standalone bundle
        working-directory: web
        run: |
          set -e
          if [ ! -f .next/standalone/server.js ]; then
            echo "::error::server.js не в корне .next/standalone — проверь outputFileTracingRoot"
            find .next/standalone -maxdepth 3 -name server.js || true
            exit 1
          fi
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          tar czf ../sabantuy-app.tgz -C .next/standalone .
          echo "bundle: $(du -h ../sabantuy-app.tgz | cut -f1)"

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -e
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$DEPLOY_SSH_HOST" ] || [ -z "$DEPLOY_SSH_PORT" ]; then
            echo "::error::Заданы не все: secrets.SSH_PRIVATE_KEY / vars.DEPLOY_SSH_HOST / vars.DEPLOY_SSH_PORT"
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_sabantuy
          chmod 600 ~/.ssh/id_ed25519_sabantuy
          ssh-keyscan -p "$DEPLOY_SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<CFG
          Host sabantuy
            HostName $DEPLOY_SSH_HOST
            Port $DEPLOY_SSH_PORT
            User valstan
            IdentityFile ~/.ssh/id_ed25519_sabantuy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          CFG
          chmod 600 ~/.ssh/config

      - name: Ship artifact + restart
        run: |
          set -e
          scp -q sabantuy-app.tgz sabantuy:/tmp/sabantuy-app.tgz
          ssh sabantuy 'bash -s' "${{ github.sha }}" <<'REMOTE'
          set -e
          SHA="$1"
          BASE=/home/valstan/sabantuy
          REL="$BASE/releases/$SHA"
          rm -rf "$REL"; mkdir -p "$REL"
          tar xzf /tmp/sabantuy-app.tgz -C "$REL"
          rm -f /tmp/sabantuy-app.tgz
          # Персистентное медиа: staticDir = <release>/public/media лежит внутри
          # релиз-директории, которую деплой пересоздаёт → загрузки/seed иначе
          # отвалились бы при следующем деплое. Подменяем на симлинк в общий
          # каталог $BASE/shared/media, переживающий релизы (MVP-замена внешнему
          # хранилищу из ADR-0001).
          mkdir -p "$BASE/shared/media"
          rm -rf "$REL/public/media"
          ln -sfn "$BASE/shared/media" "$REL/public/media"
          ln -sfn "$REL" "$BASE/current"
          sudo systemctl restart sabantuy
          # держим последние 5 релизов
          ls -1dt "$BASE"/releases/*/ 2>/dev/null | tail -n +6 | xargs -r rm -rf
          echo "deployed $SHA"
          REMOTE

      # #011 content-smoke: проверяем не только корень, а ключевые публичные
      # маршруты — главная, карта фестиваля и вход в админку. Все проверки гоним
      # одним ssh-заходом на боксе и собираем ВСЕ провалы (не падаем на первом),
      # чтобы в логе сразу был виден полный расклад. `::error::`-аннотации с бокса
      # уходят в stdout шага → GitHub Actions их подхватывает.
      - name: Smoke check — local routes (/, /map, /admin)
        run: |
          set -e
          ssh sabantuy 'bash -s' <<'REMOTE'
          set -e
          sleep 6   # дать сервису подняться после systemctl restart
          fail=0
          check() {
            path="$1"; expected="$2"
            status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "http://127.0.0.1:3000$path" || true)
            echo "local $path → $status (ожидалось: $expected)"
            case " $expected " in
              *" $status "*) ;;
              *) echo "::error::local $path = $status, ожидалось одно из: $expected"; fail=1 ;;
            esac
          }
          check "/"      "200"
          check "/map"   "200"
          # /admin без сессии отдаёт экран входа (на этом сетапе 200); допускаем и
          # редирект на /admin/login — главное, что не 5xx/000.
          check "/admin" "200 302 307 308"
          exit $fail
          REMOTE

      - name: On failure — журналы прода
        if: failure()
        run: |
          ssh sabantuy "sudo systemctl status sabantuy --no-pager -l" 2>&1 || true
          ssh sabantuy "sudo journalctl -u sabantuy -n 80 --no-pager" 2>&1 || true
