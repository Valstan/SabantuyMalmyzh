name: Moderate VK photo candidates (manual)

# Фотостена (I8): пакетная модерация кандидатов.
#   action=list    — CSV кандидатов status=new в лог (id;vk_key;author;urls) — read-only.
#   action=approve — одобрить id из ids (Local API → хук качает кадры в Media).
#   action=reject  — отклонить id из ids.
#
# Требует те же доступы, что deploy-prod.yml.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'git-ref репозитория для кода на боксе'
        required: true
        default: 'main'
      action:
        description: 'list | approve | reject'
        required: true
        default: 'list'
      ids:
        description: 'id кандидатов через запятую (для approve/reject)'
        required: false
        default: ''

concurrency:
  group: prod-db
  cancel-in-progress: false

jobs:
  moderate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -e
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$DEPLOY_SSH_HOST" ] || [ -z "$DEPLOY_SSH_PORT" ]; then
            echo "::error::Заданы не все: secrets.SSH_PRIVATE_KEY / vars.DEPLOY_SSH_HOST / vars.DEPLOY_SSH_PORT"
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_sabantuy
          chmod 600 ~/.ssh/id_ed25519_sabantuy
          ssh-keyscan -p "$DEPLOY_SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<CFG
          Host sabantuy
            HostName $DEPLOY_SSH_HOST
            Port $DEPLOY_SSH_PORT
            User valstan
            IdentityFile ~/.ssh/id_ed25519_sabantuy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          CFG
          chmod 600 ~/.ssh/config

      - name: Moderate on box
        run: |
          set -e
          ssh sabantuy 'bash -s' "${{ inputs.ref }}" "${{ inputs.action }}" "${{ inputs.ids }}" <<'REMOTE'
          set -euo pipefail
          REF="$1"
          ACTION="$2"
          IDS="${3:-}"
          BASE=/home/valstan/sabantuy
          REPO="$BASE/repo"
          GIT_SSH="ssh -i $HOME/.ssh/github_sabantuy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

          ENVF=/etc/sabantuy/sabantuy.env
          DB=$(grep '^DATABASE_URL=' "$ENVF" | head -1 | sed 's/^DATABASE_URL=//;s/^"//;s/"$//')
          SECRET=$(grep '^PAYLOAD_SECRET=' "$ENVF" | head -1 | sed 's/^PAYLOAD_SECRET=//;s/^"//;s/"$//')
          # MEDIA_DIR обязателен: approve-хук качает кадр в Media (staticDir).
          # Без него файлы легли бы в public/media ЧЕКАУТА (эфемерный), а живое
          # приложение отдаёт из персистентного MEDIA_DIR → битые картинки.
          MEDIA=$(grep '^MEDIA_DIR=' "$ENVF" | head -1 | sed 's/^MEDIA_DIR=//;s/^"//;s/"$//')
          if [ -z "$DB" ] || [ -z "$SECRET" ]; then echo "::error::нет DATABASE_URL/PAYLOAD_SECRET в $ENVF"; exit 1; fi
          if [ -z "$MEDIA" ]; then echo "::error::нет MEDIA_DIR в $ENVF — approve сложил бы кадры в чекаут"; exit 1; fi

          if [ "$ACTION" = "list" ]; then
            echo "=== CSV кандидатов (status=new) ==="
            psql "$DB" -A -F';' -c "SELECT id, vk_key, coalesce(author_name,''), photo_url, post_url, left(coalesce(text,''),60) FROM vk_candidates WHERE status='new' ORDER BY vk_published_at DESC;"
            exit 0
          fi

          if [ ! -d "$REPO/.git" ]; then
            GIT_SSH_COMMAND="$GIT_SSH" git clone git@github.com:Valstan/SabantuyMalmyzh.git "$REPO"
          fi
          cd "$REPO"
          GIT_SSH_COMMAND="$GIT_SSH" git fetch --depth 1 origin "$REF"
          git checkout -f FETCH_HEAD
          corepack prepare pnpm@10.15.0 --activate
          corepack pnpm -C web install --frozen-lockfile

          JITI=$(ls -d web/node_modules/.pnpm/jiti@*/node_modules/jiti/lib/jiti-cli.mjs 2>/dev/null | head -1)
          if [ -z "$JITI" ]; then echo "::error::jiti не найден"; exit 1; fi
          NODE_ENV=production \
          DATABASE_URL="$DB" PAYLOAD_SECRET="$SECRET" MEDIA_DIR="$MEDIA" \
          VK_MODERATE_ACTION="$ACTION" VK_MODERATE_IDS="$IDS" \
            node "$JITI" web/src/seed/moderateVkCandidates.ts

          echo "кандидатов по статусам: $(psql "$DB" -tAc "SELECT status || '=' || count(*) FROM vk_candidates GROUP BY status ORDER BY status;" | tr '\n' ' ')"
          REMOTE
